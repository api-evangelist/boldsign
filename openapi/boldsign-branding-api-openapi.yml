          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
components:
  schemas:
    CustomDomainSettings:
      title: CustomDomainSettings
      type: object
      properties:
        domainName:
          title: String
          type: string
          nullable: true
        fromName:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    DocumentExpirySettings:
      title: DocumentExpirySettings
      type: object
      properties:
        expiryDateType:
          title: Nullable`1
          enum:
          - Days
          - Hours
          - SpecificDateTime
          type: string
          format: Enumeration
          nullable: true
        expiryValue:
          title: Nullable`1
          type: integer
          format: int32
          nullable: true
        enableDefaultExpiryAlert:
          title: Nullable`1
          type: boolean
          nullable: true
        enableAutoReminder:
          title: Nullable`1
          type: boolean
          nullable: true
        reminderDays:
          title: Nullable`1
          maximum: 180
          minimum: 1
          type: integer
          format: int32
          nullable: true
        reminderCount:
          title: Nullable`1
          type: integer
          format: int32
          nullable: true
      additionalProperties: false
    SignatureFrameSettings:
      title: SignatureFrameSettings
      type: object
      properties:
        enableSignatureFrame:
          title: Boolean
          type: boolean
          default: false
        showRecipientName:
          title: Boolean
          type: boolean
          default: false
        showRecipientEmail:
          title: Boolean
          type: boolean
          default: false
        showTimeStamp:
          title: Boolean
          type: boolean
          default: false
      additionalProperties: false
    ErrorResult:
      title: ErrorResult
      type: object
      properties:
        error:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    BrandingRecords:
      title: BrandingRecords
      type: object
      properties:
        result:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/ViewBrandDetails'
          nullable: true
      additionalProperties: false
    BrandingMessage:
      title: BrandingMessage
      type: object
      properties:
        message:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    ViewBrandDetails:
      title: ViewBrandDetails
      type: object
      properties:
        brandId:
          title: String
          type: string
          nullable: true
        brandLogo:
          title: String
          type: string
          nullable: true
        brandName:
          title: String
          type: string
          nullable: true
        backgroundColor:
          title: String
          type: string
          nullable: true
        buttonColor:
          title: String
          type: string
          nullable: true
        buttonTextColor:
          title: String
          type: string
          nullable: true
        emailDisplayName:
          title: String
          type: string
          nullable: true
        disclaimerTitle:
          title: String
          type: string
          nullable: true
        disclaimerDescription:
          title: String
          type: string
          nullable: true
        redirectUrl:
          title: String
          type: string
          nullable: true
        isDefault:
          title: Boolean
          type: boolean
        canHideTagLine:
          title: Boolean
          type: boolean
        combineAuditTrail:
          title: Boolean
          type: boolean
        combineAttachments:
          title: Boolean
          type: boolean
        excludeAuditTrailFromEmail:
          title: Boolean
          type: boolean
        emailSignedDocument:
          title: EmailSignedDocument
          enum:
          - Attachment
          - DocumentLink
          type: string
        documentTimeZone:
          title: String
          type: string
          nullable: true
        showBuiltInFormFields:
          title: Boolean
          type: boolean
        allowCustomFieldCreation:
          title: Boolean
          type: boolean
        showSharedCustomFields:
          title: Boolean
          type: boolean
        hideDecline:
          title: Boolean
          type: boolean
        hideSave:
          title: Boolean
          type: boolean
        documentExpirySettings:
          $ref: '#/components/schemas/DocumentExpirySettings'
        customDomainSettings:
          $ref: '#/components/schemas/CustomDomainSettings'
        isDomainVerified:
          title: Boolean
          type: boolean
        signatureFrameSettings:
          $ref: '#/components/schemas/SignatureFrameSettings'
      additionalProperties: false
    BrandCreated:
      title: BrandCreated
      type: object
      properties:
        brandId:
          title: String
          type: string
          nullable: true
      additionalProperties: false
  securitySchemes:
    Bearer:
      type: apiKey
      description: 'Format ''Bearer'' [space] [TOKEN]. Ex: ''Bearer eyJhbGciOiJIUzI1N'''
      name: Authorization
      in: header
    X-API-KEY:
      type: apiKey
      description: 'Format [API-KEY]. Ex: ''abcdef12345'''
      name: X-API-KEY
      in: header
externalDocs:
  description: BoldSign Developer Documentation
  url: https://developers.boldsign.com/
