  /v1/contactGroups/get:
    get:
      tags:
      - GroupContacts
      summary: Get Summary of the Group Contact.
      operationId: GetGroupContact
      parameters:
      - name: groupId
        in: query
        required: true
        schema:
          title: String
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetGroupContactDetails'
        '401':
          description: Unauthorized
