components:
  schemas:
    Creators:
      title: Creators
      type: object
      properties:
        userId:
          title: String
          type: string
          nullable: true
        createdBy:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    ContactPageDetails:
      title: ContactPageDetails
      type: object
      properties:
        pageSize:
          title: Int32
          type: integer
          format: int32
        page:
          title: Int32
          type: integer
          format: int32
        totalRecordsCount:
          title: Int32
          type: integer
          format: int32
      additionalProperties: false
    GetGroupContactDetails:
      title: GetGroupContactDetails
      type: object
      properties:
        groupName:
          title: String
          type: string
          nullable: true
        groupId:
          title: String
          type: string
          nullable: true
        contacts:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/GroupUser'
          nullable: true
        creator:
          $ref: '#/components/schemas/Creators'
        directories:
          title: List`1
          type: array
          items:
            title: String
            type: string
          nullable: true
      additionalProperties: false
    ErrorResult:
      title: ErrorResult
      type: object
      properties:
        error:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    UpdateGroupContact:
      title: UpdateGroupContact
      type: object
      properties:
        groupName:
          title: String
          type: string
          nullable: true
        directories:
          title: List`1
          type: array
          items:
            title: String
            type: string
          nullable: true
        contacts:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/GroupUser'
          nullable: true
      additionalProperties: false
    GroupContact:
      title: GroupContact
      type: object
      properties:
        groupName:
          title: String
          type: string
          nullable: true
        groupId:
          title: String
          type: string
          nullable: true
        contacts:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/GroupUser'
          nullable: true
        directories:
          title: List`1
          type: array
          items:
            title: String
            type: string
          nullable: true
      additionalProperties: false
    GroupContactsList:
      title: GroupContactsList
      type: object
      properties:
        pageDetails:
          $ref: '#/components/schemas/ContactPageDetails'
        result:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/GroupContact'
          nullable: true
      additionalProperties: false
    GroupContactDetails:
      title: GroupContactDetails
      required:
      - contacts
      - groupName
      type: object
      properties:
        groupName:
          title: String
          minLength: 1
          type: string
        directories:
          title: List`1
          type: array
          items:
            title: String
            type: string
          nullable: true
        contacts:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/GroupUser'
      additionalProperties: false
    CreateGroupContactResponse:
      title: CreateGroupContactResponse
      type: object
      properties:
        groupId:
          title: String
          type: string
          nullable: true
        groupName:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    GroupUser:
      title: GroupUser
      required:
      - email
      - name
      type: object
      properties:
        name:
          title: String
          minLength: 1
          type: string
        email:
          title: String
          minLength: 1
          type: string
      additionalProperties: false
  securitySchemes:
    Bearer:
      type: apiKey
      description: 'Format ''Bearer'' [space] [TOKEN]. Ex: ''Bearer eyJhbGciOiJIUzI1N'''
      name: Authorization
      in: header
    X-API-KEY:
      type: apiKey
      description: 'Format [API-KEY]. Ex: ''abcdef12345'''
      name: X-API-KEY
      in: header
externalDocs:
