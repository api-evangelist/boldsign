openapi: 3.0.3
info:
  title: BoldSign Branding Contacts API
  version: '1'
  description: BoldSign eSignature REST API for sending documents for electronic signature, managing reusable templates, tracking envelope status, embedding signing and requesting workflows into third-party applications. Supports API key and OAuth 2.0 authentication. Regional endpoints available for US, EU, CA, and AU.
  contact:
    name: BoldSign Support
    url: https://developers.boldsign.com/
    email: support@boldsign.com
  license:
    name: Proprietary
    url: https://boldsign.com/terms-of-use/
  termsOfService: https://boldsign.com/terms-of-use/
servers:
- url: https://api.boldsign.com
  description: US production
- url: https://eu.boldsign.com
  description: EU production
- url: https://ca.boldsign.com
  description: CA production
- url: https://au.boldsign.com
  description: AU production
security:
- Bearer: []
- X-API-KEY: []
tags:
- name: Contacts
paths:
  /v1/contacts/list:
    get:
      tags:
      - Contacts
      summary: List Contact document.
      operationId: ContactUserList
      parameters:
      - name: PageSize
        in: query
        description: Page size specified in get user contact list request. Default value is 10.
        schema:
          title: Int32
          type: integer
          format: int32
          default: 10
      - name: Page
        in: query
        description: Page index specified in get user contact list request. Default value is 1.
        required: true
        schema:
          title: Int32
          type: integer
          format: int32
          default: 1
      - name: SearchKey
        in: query
        description: Contacts can be listed by the search  based on the Name or Email
        schema:
          title: String
          type: string
      - name: ContactType
        in: query
        description: Contact type whether the contact is My Contacts or All Contacts. Default value is AllContacts.
        schema:
          title: ContactType
          enum:
          - MyContacts
          - AllContacts
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactsList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/contacts/delete:
    delete:
      tags:
      - Contacts
      summary: Deletes a contact.
      operationId: DeleteContacts
      parameters:
      - name: id
        in: query
        required: true
        schema:
          title: String
          type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
