components:
  schemas:
    PhoneNumber:
      title: PhoneNumber
      type: object
      properties:
        countryCode:
          title: String
          type: string
          nullable: true
        number:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    CreateContactResponse:
      title: CreateContactResponse
      type: object
      properties:
        createdContacts:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/ContactCreated'
          nullable: true
      additionalProperties: false
    ContactPageDetails:
      title: ContactPageDetails
      type: object
      properties:
        pageSize:
          title: Int32
          type: integer
          format: int32
        page:
          title: Int32
          type: integer
          format: int32
        totalRecordsCount:
          title: Int32
          type: integer
          format: int32
      additionalProperties: false
    ErrorResult:
      title: ErrorResult
      type: object
      properties:
        error:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    ContactDetails:
      title: ContactDetails
      required:
      - email
      - name
      type: object
      properties:
        email:
          title: String
          minLength: 1
          type: string
        name:
          title: String
          minLength: 1
          type: string
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumber'
        jobTitle:
          title: String
          type: string
          nullable: true
        companyName:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    ContactCreated:
      title: ContactCreated
      type: object
      properties:
        id:
          title: String
          type: string
          nullable: true
        email:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    ContactsDetails:
      title: ContactsDetails
      type: object
      properties:
        id:
          title: String
          type: string
          nullable: true
        name:
          title: String
          type: string
          nullable: true
        email:
          title: String
          type: string
          nullable: true
        companyName:
          title: String
          type: string
          nullable: true
        jobTitle:
          title: String
          type: string
          nullable: true
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumber'
      additionalProperties: false
    ContactsList:
      title: ContactsList
      type: object
      properties:
        pageDetails:
          $ref: '#/components/schemas/ContactPageDetails'
        result:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/ContactsDetails'
          nullable: true
      additionalProperties: false
  securitySchemes:
    Bearer:
      type: apiKey
      description: 'Format ''Bearer'' [space] [TOKEN]. Ex: ''Bearer eyJhbGciOiJIUzI1N'''
      name: Authorization
      in: header
    X-API-KEY:
      type: apiKey
      description: 'Format [API-KEY]. Ex: ''abcdef12345'''
      name: X-API-KEY
      in: header
externalDocs:
