openapi: 3.0.3
info:
  title: BoldSign Branding Teams API
  version: '1'
  description: BoldSign eSignature REST API for sending documents for electronic signature, managing reusable templates, tracking envelope status, embedding signing and requesting workflows into third-party applications. Supports API key and OAuth 2.0 authentication. Regional endpoints available for US, EU, CA, and AU.
  contact:
    name: BoldSign Support
    url: https://developers.boldsign.com/
    email: support@boldsign.com
  license:
    name: Proprietary
    url: https://boldsign.com/terms-of-use/
  termsOfService: https://boldsign.com/terms-of-use/
servers:
- url: https://api.boldsign.com
  description: US production
- url: https://eu.boldsign.com
  description: EU production
- url: https://ca.boldsign.com
  description: CA production
- url: https://au.boldsign.com
  description: AU production
security:
- Bearer: []
- X-API-KEY: []
tags:
- name: Teams
paths:
  /v1/teams/get:
    get:
      tags:
      - Teams
      summary: Get Team details.
      operationId: GetTeam
      parameters:
      - name: teamId
        in: query
        required: true
        schema:
          title: String
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/teams/list:
    get:
      tags:
      - Teams
      summary: List Teams.
      operationId: ListTeams
      parameters:
      - name: Page
        in: query
        description: Page index specified in get team list request.
        required: true
        schema:
          title: Int32
          type: integer
          format: int32
          default: 1
      - name: PageSize
        in: query
        description: Page size specified in get team list request.
        schema:
          title: Int32
          type: integer
          format: int32
          default: 10
      - name: SearchKey
        in: query
        description: Teams can be listed by the search key
        schema:
          title: String
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/teams/create:
    post:
      tags:
      - Teams
      summary: Create Team.
      operationId: CreateTeam
      requestBody:
        description: team creation.
        content:
          application/json;odata.metadata=minimal;odata.streaming=true:
