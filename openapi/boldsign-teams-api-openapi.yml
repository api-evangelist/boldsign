components:
  schemas:
    TeamPageDetails:
      title: TeamPageDetails
      type: object
      properties:
        pageSize:
          title: Int32
          type: integer
          format: int32
        page:
          title: Int32
          type: integer
          format: int32
      additionalProperties: false
    ErrorResult:
      title: ErrorResult
      type: object
      properties:
        error:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    TeamUsers:
      title: TeamUsers
      type: object
      properties:
        userId:
          title: String
          type: string
          nullable: true
        email:
          title: String
          type: string
          nullable: true
        firstName:
          title: String
          type: string
          nullable: true
        lastName:
          title: String
          type: string
          nullable: true
        userRole:
          title: UserRole
          enum:
          - AccountAdmin
          - TeamAdmin
          - TeamMember
          type: string
        userStatus:
          title: UserStatus
          enum:
          - Active
          - InvitationPending
          - Deactivated
          type: string
      additionalProperties: false
    TeamUpdateRequest:
      title: TeamUpdateRequest
      required:
      - teamId
      - teamName
      type: object
      properties:
        teamId:
          title: String
          minLength: 1
          type: string
        teamName:
          title: String
          maxLength: 255
          minLength: 0
          type: string
      additionalProperties: false
    TeamListResponse:
      title: TeamListResponse
      type: object
      properties:
        pageDetails:
          $ref: '#/components/schemas/TeamPageDetails'
        results:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/Teams'
          nullable: true
      additionalProperties: false
    CreateTeamRequest:
      title: CreateTeamRequest
      required:
      - teamName
      type: object
      properties:
        teamName:
          title: String
          maxLength: 255
          minLength: 0
          type: string
      additionalProperties: false
    TeamCreated:
      title: TeamCreated
      type: object
      properties:
        teamId:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    TeamResponse:
      title: TeamResponse
      type: object
      properties:
        teamId:
          title: String
          type: string
          nullable: true
        teamName:
          title: String
          type: string
          nullable: true
        users:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/TeamUsers'
          nullable: true
        createdDate:
          title: Int64
          type: integer
          format: int64
        modifiedDate:
          title: Int64
          type: integer
          format: int64
      additionalProperties: false
    Teams:
      title: Teams
      type: object
      properties:
        teamName:
          title: String
          type: string
          nullable: true
        teamId:
          title: String
          type: string
          nullable: true
        createdDate:
          title: Int64
          type: integer
          format: int64
        modifiedDate:
          title: Int64
          type: integer
          format: int64
      additionalProperties: false
  securitySchemes:
    Bearer:
      type: apiKey
      description: 'Format ''Bearer'' [space] [TOKEN]. Ex: ''Bearer eyJhbGciOiJIUzI1N'''
      name: Authorization
      in: header
    X-API-KEY:
      type: apiKey
      description: 'Format [API-KEY]. Ex: ''abcdef12345'''
      name: X-API-KEY
      in: header
externalDocs:
