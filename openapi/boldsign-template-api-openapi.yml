openapi: 3.0.3
info:
  title: BoldSign Branding Template API
  version: '1'
  description: BoldSign eSignature REST API for sending documents for electronic signature, managing reusable templates, tracking envelope status, embedding signing and requesting workflows into third-party applications. Supports API key and OAuth 2.0 authentication. Regional endpoints available for US, EU, CA, and AU.
  contact:
    name: BoldSign Support
    url: https://developers.boldsign.com/
    email: support@boldsign.com
  license:
    name: Proprietary
    url: https://boldsign.com/terms-of-use/
  termsOfService: https://boldsign.com/terms-of-use/
servers:
- url: https://api.boldsign.com
  description: US production
- url: https://eu.boldsign.com
  description: EU production
- url: https://ca.boldsign.com
  description: CA production
- url: https://au.boldsign.com
  description: AU production
security:
- Bearer: []
- X-API-KEY: []
tags:
- name: Template
paths:
  /v1/template/list:
    get:
      tags:
      - Template
      summary: List all the templates.
      operationId: ListTemplates
      parameters:
      - name: TemplateType
        in: query
        schema:
          title: TemplateType
          enum:
          - mytemplates
          - sharedtemplate
          - all
          type: string
      - name: PageSize
        in: query
        schema:
          title: Int32
          type: integer
          format: int32
          default: 10
      - name: Page
        in: query
        required: true
        schema:
          title: Int32
          type: integer
          format: int32
          default: 1
      - name: SearchKey
        in: query
        schema:
          title: String
          type: string
      - name: OnBehalfOf
        in: query
        description: The sender identity's email used to filter the templates returned in the API. The API will return templates that were sent on behalf of the specified email address.
        schema:
          title: List`1
          type: array
          items:
            title: String
            type: string
      - name: CreatedBy
        in: query
        description: The templates can be listed by the creator of the template.
        schema:
          title: List`1
          type: array
          items:
            title: String
            type: string
      - name: TemplateLabels
        in: query
        description: Labels of the template.
        schema:
          title: List`1
          type: array
          items:
            title: String
            type: string
      - name: StartDate
        in: query
        description: Start date of the template
        schema:
          title: Nullable`1
          type: string
          format: date-time
      - name: EndDate
        in: query
        description: End date of the template
        schema:
          title: Nullable`1
          type: string
          format: date-time
      - name: BrandIds
        in: query
        description: BrandId(s) of the template.
        schema:
          title: List`1
          type: array
          items:
            title: String
            type: string
      - name: SharedWithTeamId
        in: query
        description: The templates can be listed by the shared teams.
        schema:
          title: List`1
          type: array
          items:
            title: String
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateRecords'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/template/create:
    post:
      tags:
      - Template
      summary: Creates a new template.
      operationId: CreateTemplate
      requestBody:
        description: The create template request body.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateCreated'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/template/createEmbeddedTemplateUrl:
    post:
      tags:
      - Template
      summary: Generates a create URL to embeds template create process into your application.
      operationId: CreateEmbeddedTemplateUrl
      requestBody:
        description: The create embedded template request body.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbeddedCreateTemplateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmbeddedCreateTemplateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmbeddedCreateTemplateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddedTemplateCreated'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/template/getEmbeddedTemplateEditUrl:
    post:
      tags:
      - Template
      summary: Generates a edit URL to embeds template edit process into your application.
      operationId: getEmbeddedTemplateEditUrl
      parameters:
      - name: templateId
        in: query
        required: true
        schema:
          title: String
          type: string
      requestBody:
        description: The embedded edit template request body.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbeddedTemplateEditRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmbeddedTemplateEditRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmbeddedTemplateEditRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddedTemplateEdited'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/template/delete:
    delete:
      tags:
      - Template
      summary: Deletes a template.
      operationId: DeleteTemplate
      parameters:
      - name: templateId
        in: query
        required: true
        schema:
          title: String
          type: string
      - name: onBehalfOf
        in: query
        schema:
          title: String
          type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/template/send:
    post:
      tags:
      - Template
      summary: Send a document for signature using a Template.
      operationId: SendUsingTemplate
      parameters:
      - name: templateId
        in: query
        required: true
        schema:
          title: String
          type: string
      requestBody:
        description: The send template details as JSON.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendForSignFromTemplateForm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendForSignFromTemplateForm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendForSignFromTemplateForm'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentCreated'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
