      summary: Download the template.
      operationId: Download
      parameters:
      - name: templateId
        in: query
        required: true
        schema:
          title: String
          type: string
      - name: onBehalfOf
        in: query
        schema:
          title: String
          type: string
      - name: includeFormFieldValues
        in: query
        schema:
          title: Boolean
          type: boolean
          default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                title: FileStreamResult
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '400':
          description: Bad Request
          content:
