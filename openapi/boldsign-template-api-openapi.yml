  /v1/template/createEmbeddedRequestUrl:
    post:
      tags:
      - Template
      summary: Generates a send URL using a template which embeds document sending process into your application.
      operationId: CreateEmbeddedRequestUrlTemplate
      parameters:
      - name: templateId
        in: query
        required: true
        schema:
          title: String
          type: string
      requestBody:
