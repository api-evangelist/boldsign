  /v1/senderIdentities/delete:
    delete:
      tags:
      - Sender Identities
      summary: Deletes sender identity.
      operationId: DeleteSenderIdentities
      parameters:
      - name: email
        in: query
        required: true
        schema:
          title: String
          type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
  /v1/senderIdentities/resendInvitation:
    post:
      tags:
      - Sender Identities
      summary: Resends sender identity invitation.
      operationId: ResendInvitationSenderIdentities
      parameters:
      - name: email
        in: query
        required: true
        schema:
          title: String
          type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
