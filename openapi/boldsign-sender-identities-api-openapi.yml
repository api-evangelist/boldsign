  /v1/senderIdentities/properties:
    get:
      tags:
      - Sender Identities
      summary: Gets sender identity by ID or email.
      operationId: GetSenderIdentityProperties
      parameters:
      - name: id
        in: query
        schema:
          title: String
          type: string
      - name: email
        in: query
        schema:
          title: String
          type: string
