  /v1/senderIdentities/list:
    get:
      tags:
      - Sender Identities
      summary: Lists sender identity.
      operationId: ListSenderIdentities
      parameters:
      - name: PageSize
        in: query
        description: Page size specified in get sender identity list request.
        schema:
          title: Int32
          type: integer
          format: int32
          default: 10
      - name: Page
        in: query
        description: Page index specified in get sender identity request.
        required: true
        schema:
          title: Int32
          type: integer
          format: int32
          default: 1
      - name: Search
        in: query
        description: Users can be listed by the search key present in the sender identity like sender identity name and email address
        schema:
          title: String
          type: string
      - name: BrandIds
        in: query
        description: A list of brand IDs to filter associated with the sender identity.
        schema:
          title: List`1
          type: array
          items:
            title: String
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SenderIdentityList'
        '401':
          description: Unauthorized
          content:
            application/json:
