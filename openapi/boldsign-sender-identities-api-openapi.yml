components:
  schemas:
    PageDetails:
      title: PageDetails
      type: object
      properties:
        pageSize:
          title: Int32
          type: integer
          format: int32
        page:
          title: Int32
          type: integer
          format: int32
        totalRecordsCount:
          title: Int32
          type: integer
          format: int32
        totalPages:
          title: Int32
          type: integer
          format: int32
        sortedColumn:
          title: String
          type: string
          nullable: true
        sortDirection:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    CreateSenderIdentityRequest:
      title: CreateSenderIdentityRequest
      required:
      - email
      type: object
      properties:
        name:
          title: String
          maxLength: 80
          minLength: 0
          type: string
          nullable: true
        email:
          title: String
          maxLength: 250
          minLength: 0
          type: string
        notificationSettings:
          $ref: '#/components/schemas/NotificationSettings'
        brandId:
          title: String
          type: string
          nullable: true
        redirectUrl:
          title: Uri
          type: string
          format: uri
          nullable: true
        metaData:
          title: Dictionary`2
          maxLength: 50
          type: object
          additionalProperties:
            title: String
            type: string
            nullable: true
          nullable: true
        locale:
          title: Locales
          enum:
          - EN
          - 'NO'
          - FR
          - DE
          - ES
          - BG
          - CS
          - DA
          - IT
          - NL
          - PL
          - PT
          - RO
          - RU
          - SV
          - Default
          - JA
          - TH
          - ZH_CN
          - ZH_TW
          - KO
          type: string
      additionalProperties: false
    ErrorResult:
      title: ErrorResult
      type: object
      properties:
        error:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    SenderIdentityCreated:
      title: SenderIdentityCreated
      type: object
      properties:
        senderIdentityId:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    SenderIdentityList:
      title: SenderIdentityList
      type: object
      properties:
        result:
          title: List`1
          type: array
          items:
            $ref: '#/components/schemas/SenderIdentityViewModel'
          nullable: true
        pageDetails:
          $ref: '#/components/schemas/PageDetails'
      additionalProperties: false
    EditSenderIdentityRequest:
      title: EditSenderIdentityRequest
      type: object
      properties:
        name:
          title: String
          maxLength: 80
          minLength: 0
          type: string
          nullable: true
        notificationSettings:
          $ref: '#/components/schemas/NotificationSettings'
        redirectUrl:
          title: Uri
          type: string
          format: uri
          nullable: true
        metaData:
          title: Dictionary`2
          maxLength: 50
          type: object
          additionalProperties:
            title: String
            type: string
            nullable: true
          nullable: true
        locale:
          title: Nullable`1
          enum:
          - EN
          - 'NO'
          - FR
          - DE
          - ES
          - BG
          - CS
          - DA
          - IT
          - NL
          - PL
          - PT
          - RO
          - RU
          - SV
          - Default
          - JA
          - TH
          - ZH_CN
          - ZH_TW
          - KO
          type: string
          nullable: true
      additionalProperties: false
    SenderIdentityViewModel:
      title: SenderIdentityViewModel
      type: object
      properties:
        id:
          title: String
          type: string
          nullable: true
        name:
          title: String
          type: string
          nullable: true
        email:
          title: String
          type: string
          nullable: true
        status:
          title: String
          type: string
          nullable: true
        createdBy:
          title: String
          type: string
          nullable: true
        approvedDate:
          title: String
          type: string
          nullable: true
        notificationSettings:
          $ref: '#/components/schemas/NotificationSettings'
        brandId:
          title: String
          type: string
          nullable: true
        redirectUrl:
          title: String
          type: string
          nullable: true
        metaData:
          title: Dictionary`2
          type: object
          additionalProperties:
            title: String
            type: string
            nullable: true
          nullable: true
        locale:
          title: String
          type: string
          nullable: true
      additionalProperties: false
    NotificationSettings:
      title: NotificationSettings
      type: object
      properties:
        viewed:
          title: Boolean
          type: boolean
          default: true
        sent:
          title: Boolean
          type: boolean
          default: false
        deliveryFailed:
          title: Boolean
          type: boolean
          default: true
        declined:
          title: Boolean
          type: boolean
          default: true
        revoked:
          title: Boolean
          type: boolean
          default: true
        reassigned:
          title: Boolean
          type: boolean
          default: true
        completed:
          title: Boolean
          type: boolean
          default: true
        signed:
          title: Boolean
          type: boolean
          default: true
        expired:
          title: Boolean
          type: boolean
          default: true
        authenticationFailed:
          title: Boolean
          type: boolean
          default: true
        reminders:
          title: Boolean
          type: boolean
          default: true
        attachSignedDocument:
          title: Boolean
          type: boolean
          default: false
      additionalProperties: false
  securitySchemes:
    Bearer:
      type: apiKey
      description: 'Format ''Bearer'' [space] [TOKEN]. Ex: ''Bearer eyJhbGciOiJIUzI1N'''
      name: Authorization
      in: header
    X-API-KEY:
      type: apiKey
      description: 'Format [API-KEY]. Ex: ''abcdef12345'''
      name: X-API-KEY
      in: header
externalDocs:
  description: BoldSign Developer Documentation
  url: https://developers.boldsign.com/
