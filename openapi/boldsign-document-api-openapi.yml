components:
  schemas:
    FormulaFieldSettings:
      title: FormulaFieldSettings
      type: object
      properties:
        formulaExpression:
          title: String
          type: string
          nullable: true
        decimalPrecision:
          title: Int32
          type: integer
          format: int32
          default: 0
      additionalProperties: false
    TextTagOffset:
      title: TextTagOffset
      type: object
      properties:
        offsetX:
          title: Double
          type: number
          format: double
        offsetY:
          title: Double
          type: number
          format: double
      additionalProperties: false
    AuthenticationSettings:
      title: AuthenticationSettings
      type: object
      properties:
        authenticationFrequency:
          title: Nullable`1
          enum:
          - None
          - EveryAccess
          - UntilSignCompleted
          - OncePerDocument
          type: string
          nullable: true
      additionalProperties: false
    DocumentCC:
      title: DocumentCC
      required:
      - emailAddress
      type: object
      properties:
        emailAddress:
          title: String
          minLength: 1
          type: string
      additionalProperties: false
    FormField:
      title: FormField
      required:
      - bounds
      - fieldType
      - pageNumber
      type: object
      properties:
        id:
          title: String
          type: string
          nullable: true
        name:
          title: String
          type: string
          nullable: true
        fieldType:
          title: FieldType
          enum:
          - Signature
          - Initial
          - CheckBox
          - TextBox
          - Label
          - DateSigned
          - RadioButton
          - Image
          - Attachment
          - EditableDate
          - Hyperlink
          - Dropdown
          - Title
          - Company
          - Formula
          - Drawing
          type: string
        pageNumber:
          title: Int32
          type: integer
          format: int32
        bounds:
          $ref: '#/components/schemas/Rectangle'
        isRequired:
          title: Boolean
          type: boolean
        isReadOnly:
          title: Boolean
          type: boolean
        value:
          title: String
          type: string
          nullable: true
        fontSize:
          title: Single
          minimum: 0
          type: number
          format: float
        font:
          title: FontFamily
          enum:
          - Helvetica
          - Courier
          - TimesRoman
          - NotoSans
          - Carlito
          type: string
        fontHexColor:
          title: String
          type: string
          nullable: true
        isBoldFont:
          title: Boolean
          type: boolean
        isItalicFont:
          title: Boolean
          type: boolean
        isUnderLineFont:
          title: Boolean
          type: boolean
        lineHeight:
          title: Int32
          maximum: 2147483647
          minimum: 0
          type: integer
          format: int32
        characterLimit:
          title: Int32
          maximum: 2147483647
          minimum: 0
          type: integer
          format: int32
        groupName:
          title: String
          type: string
          nullable: true
        label:
          title: String
          type: string
          nullable: true
        placeHolder:
          title: String
          type: string
          nullable: true
        validationType:
          title: ValidationType
          enum:
          - None
          - NumbersOnly
          - EmailAddress
          - Currency
          - CustomRegex
          type: string
