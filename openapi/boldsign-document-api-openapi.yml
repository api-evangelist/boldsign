          - Received
          - Both
          type: string
      - name: DateFilterType
        in: query
        description: Date Filter as SentBetween and Expiring.
        schema:
          title: DateFilterType
          enum:
          - SentBetween
          - Expiring
          type: string
      - name: PageSize
        in: query
        description: Page size specified in get document list request.
