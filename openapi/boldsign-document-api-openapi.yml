  /v1/document/list:
    get:
      tags:
      - Document
      summary: List user documents.
      operationId: ListDocuments
      parameters:
      - name: SentBy
        in: query
        schema:
          title: List`1
          type: array
          items:
            title: String
            type: string
      - name: Recipients
        in: query
        schema:
          title: List`1
          type: array
          items:
            title: String
            type: string
      - name: TransmitType
        in: query
        schema:
          title: TransmitType
          enum:
          - Sent
          - Received
          - Both
          type: string
      - name: DateFilterType
        in: query
        description: Date Filter as SentBetween and ExpiresOn.
        schema:
          title: DateFilterType
          enum:
          - SentBetween
          - Expiring
          type: string
      - name: PageSize
        in: query
        description: Page size specified in get document list request.
        schema:
          title: Int32
          type: integer
          format: int32
          default: 10
      - name: Page
        in: query
        description: Page index specified in get document list request.
        required: true
        schema:
          title: Int32
          type: integer
          format: int32
          default: 1
      - name: StartDate
        in: query
        description: Start date of the document
        schema:
          title: Nullable`1
          type: string
          format: date-time
      - name: Status
        in: query
        description: Status of the document such as In-progress, Completed, Decline, Expired, Revoked, Draft.
        schema:
          title: List`1
          type: array
          items:
            title: Status
            enum:
            - None
            - WaitingForMe
            - WaitingForOthers
            - NeedAttention
            - Completed
            - Declined
            - Revoked
            - Expired
            - Draft
            - Scheduled
            type: string
      - name: EndDate
        in: query
        description: End date of the document
        schema:
          title: Nullable`1
          type: string
          format: date-time
      - name: SearchKey
        in: query
        description: Documents can be listed by the search key present in the document like document title, document ID, sender or recipient(s) name, etc.,
        schema:
          title: String
          type: string
      - name: Labels
        in: query
        description: Labels of the document.
        schema:
          title: IEnumerable`1
          type: array
          items:
            title: String
            type: string
      - name: NextCursor
        in: query
        description: Next cursor value for pagination, required for fetching the next set of documents beyond 10,000 records.
        schema:
          title: Nullable`1
          type: integer
          format: int64
      - name: BrandIds
        in: query
        description: BrandId(s) of the document.
        schema:
          title: List`1
          type: array
          items:
            title: String
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRecords'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
