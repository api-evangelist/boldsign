description: >
  BoldSign is an e-signature platform built by Syncfusion that provides a REST API
  for sending documents for electronic signature, managing reusable templates, tracking
  envelope status, and embedding signing and requesting workflows directly into third-party
  applications. The API supports both API key and OAuth 2.0 authentication and outputs
  JSON responses across US, EU, CA, and AU regional endpoints. BoldSign offers official
  SDKs for .NET, Python, Java, Node.js, and PHP, along with a free sandbox environment,
  a Postman collection, and an interactive API Explorer. The platform is SOC 2 Type II,
  HIPAA, GDPR, and eIDAS compliant, and supports webhooks for real-time event notifications.
